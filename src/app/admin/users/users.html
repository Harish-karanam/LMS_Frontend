<div class="admin-page">

  <h2>All Users</h2>

  <table
    class="users-table"
    *ngIf="users.length > 0">

    <thead>
      <tr>
        <th>Employee Code</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Manager</th>
        <th>Department</th>
        <th>Project</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let user of users">

        <td>{{ user.employeeCode }}</td>

        <td>
          {{ user.firstName }} {{ user.lastName }}
        </td>

        <td>{{ user.email }}</td>

        <td>{{ user.roleName }}</td>

        <td>{{ user.managerName || '-' }}</td>

        <td>{{ user.departmentName }}</td>

        <td>{{ user.projectName }}</td>

        <td>
          <span
            class="status-badge"
            [ngClass]="{
              'active': user.status === 'ACTIVE',
              'inactive': user.status === 'INACTIVE'
            }">

            {{ user.status }}

          </span>
        </td>

      </tr>

    </tbody>

  </table>

  <p
    class="empty-message"
    *ngIf="users.length === 0">

    No users found.

  </p>

</div>
