<div class="page-container">

  <mat-card>
    <br>

    <mat-card-title>
      Employee Leave Balances
    </mat-card-title>
    <br>

  <table
  *ngIf="leaveBalances.length"
  mat-table
  [dataSource]="leaveBalances"
  class="mat-elevation-z8">

  <ng-container matColumnDef="employeeCode">
    <th mat-header-cell *matHeaderCellDef>Emp Code</th>
    <td mat-cell *matCellDef="let row">
      {{ row.employeeCode }}
    </td>
  </ng-container>

  <ng-container matColumnDef="employeeName">
    <th mat-header-cell *matHeaderCellDef>Employee Name</th>
    <td mat-cell *matCellDef="let row">
      {{ row.employeeName }}
    </td>
  </ng-container>

  <ng-container matColumnDef="sickLeave">
    <th mat-header-cell *matHeaderCellDef>Sick Leave</th>
    <td mat-cell *matCellDef="let row">
      {{ row.sickLeave }}
    </td>
  </ng-container>

  <ng-container matColumnDef="casualLeave">
    <th mat-header-cell *matHeaderCellDef>Casual Leave</th>
    <td mat-cell *matCellDef="let row">
      {{ row.casualLeave }}
    </td>
  </ng-container>

  <ng-container matColumnDef="earnedLeave">
    <th mat-header-cell *matHeaderCellDef>Earned Leave</th>
    <td mat-cell *matCellDef="let row">
      {{ row.earnedLeave }}
    </td>
  </ng-container>

  <ng-container matColumnDef="maternityLeave">
    <th mat-header-cell *matHeaderCellDef>Maternity Leave</th>
    <td mat-cell *matCellDef="let row">
      {{ row.maternityLeave }}
    </td>
  </ng-container>

  <ng-container matColumnDef="lop">
    <th mat-header-cell *matHeaderCellDef>LOP</th>
    <td mat-cell *matCellDef="let row">
      {{ row.lop }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

  </mat-card>

</div>
