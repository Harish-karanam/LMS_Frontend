<div class="page-container">

  <mat-card>

    <mat-card-title>HR - Projects Data</mat-card-title>

    <table mat-table [dataSource]="projects" class="mat-elevation-z8">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> Project ID </th>
        <td mat-cell *matCellDef="let project"> {{ project.id }} </td>
      </ng-container>

      <ng-container matColumnDef="projectName">
        <th mat-header-cell *matHeaderCellDef> Project Name </th>
        <td mat-cell *matCellDef="let project"> {{ project.projectName }} </td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>  </th>
        <td mat-cell *matCellDef="let project"> {{ project.description }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </mat-card>

</div>
