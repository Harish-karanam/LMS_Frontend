<div class="team-container">

  <h2>My Team Members</h2>

  <table
    class="team-table"
    *ngIf="teamMembers.length > 0">

    <thead>
      <tr>
        <th>Employee Code</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Department</th>
        <th>Project</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let user of teamMembers">

        <td>{{ user.employeeCode }}</td>

        <td>
          {{ user.firstName }} {{ user.lastName }}
        </td>

        <td>{{ user.email }}</td>

        <td>{{ user.roleName }}</td>

        <td>{{ user.departmentName }}</td>

        <td>{{ user.projectName }}</td>

        <td>
          <span class="status-badge">
            {{ user.status }}
          </span>
        </td>

      </tr>

    </tbody>

  </table>

  <p
    class="empty-message"
    *ngIf="teamMembers.length === 0">

    No team members assigned.

  </p>

</div>
