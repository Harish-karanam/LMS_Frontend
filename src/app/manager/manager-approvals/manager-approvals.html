<div class="approval-container">

  <h2>Manager Leave Approvals</h2>

  <table
    class="approval-table"
    *ngIf="leaveRequests.length > 0">

    <thead>
      <tr>
        <th>Employee</th>
        <th>Leave Type</th>
        <th>Reason</th>
        <th>From</th>
        <th>To</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let leave of leaveRequests">

        <td>{{ leave.employeeName }}</td>
        <td>{{ leave.leaveType }}</td>
        <td>{{ leave.reason }}</td>
        <td>{{ leave.startDate }}</td>
        <td>{{ leave.endDate }}</td>
        <td>
          <span class="status">
            {{ leave.status }}
          </span>
        </td>

        <!-- <td>

          <button
            mat-raised-button
            color="primary"
            *ngIf="leave.status === 'PENDING'"
            (click)="approveLeave(leave.id)">

            Approve

          </button>

          <button
            mat-raised-button
            color="warn"
            *ngIf="leave.status === 'PENDING'"
            (click)="rejectLeave(leave.id)">

            Reject

          </button>

            <span *ngIf="leave.status === 'MANAGER_APPROVED' && 'HR_APPROVED'">
                Approved
            </span>

              <span *ngIf="leave.status === 'MANAGER_REJECTED'">
                  Rejected
              </span>

        </td> -->

        <td [ngSwitch]="leave.status">

  <ng-container *ngSwitchCase="'PENDING'">

    <button
      mat-raised-button
      color="primary"
      (click)="approveLeave(leave.id)">
      Approve
    </button>

    <button
      mat-raised-button
      color="warn"
      (click)="rejectLeave(leave.id)">
      Reject
    </button>

  </ng-container>

  <span *ngSwitchCase="'MANAGER_APPROVED'">
    Sent to HR
  </span>

  <span *ngSwitchCase="'MANAGER_REJECTED'">
    Rejected by Manager
  </span>

  <span *ngSwitchCase="'HR_APPROVED'">
    Approved by Manager & HR
  </span>

  <span *ngSwitchCase="'HR_REJECTED'">
    Rejected by HR
  </span>

</td>

      </tr>

    </tbody>

  </table>

  <p
    class="empty-message"
    *ngIf="leaveRequests.length === 0">

    No leave requests found

  </p>

</div>
